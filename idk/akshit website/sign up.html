<html>
<head>
    <meta name="viewport" content="width=device-width , initial-scale=1.0">
    <title>
        Sign up
    </title>
    <style>
        form{
            border:3px solid black;
            border-radius: 10px;
            padding: 25px;
            background-color: rgba(224, 204, 135, 0.1)));
            margin :20px auto;
            box-shadow: 0 0 5px;
            
            backdrop-filter:blur(6px);
          max-width:500px;
            font-weight: bolder;
}
body{
            background:linear-gradient(to right,rgb(216, 129, 129), rgb(187, 168, 133));
            background-size: cover;
            margin:0;
            padding:0;
            background-position: 100px;
            background-repeat: no-repeat;
        }
      label{
        font-family:'Gill Sans';
    color: black;
    font-weight:bolder;
    margin-top:15px;
    font-size: clamp(18px,2vw,23px);
    
      }
     input[type=text]{
        color:black;
        font-size:24px;
        width:100%;
        margin:2px;
        margin-bottom: 15px;
        height:auto;
        padding: 10px;;
        display:inline-flex;
        border:1px solid black;
        border-radius: 2px;
        box-sizing: border-box;
      } 
      input[type=button]{
        color:black;
        background-color: rgb(186, 197, 204);
        font-size:24px;
        width:100%;
        margin: 20px auto 0 auto;
        align-items: center;
        height:auto;
        padding:10px 20px;
        max-width:200px;
         display:block;
        border:2px solid black;
        border-radius: 3px;
        cursor: pointer;
      } 
      @media(max-width:600px)
      {
        input[type="button"]
        {
            width:80%
        }
      }
      input[type=button] {
  transition-duration: 0.4s;
}

input[type=button]:hover {
  background-color: #bfc7c4; /* Green */
  color: white;
}
    </style>
</head>

<body>
    <h1 style="font-size: 36px;color:rgb(255, 255, 255);text-align: center;">Login Form</h1>
<hr>
        <form>
            <label for="fname">First name:</label>
            <input type="text" id="fname" name="fname">
            <label>Password</label>
            <input type="text" id="fpass" name="fpass">
            
        
        
            <input type="button" value="submit" onclick="alert('Successfully signed in!!');" >
            </form>    
</body>
    </form>
</body>
